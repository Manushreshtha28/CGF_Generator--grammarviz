document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('seg-leftmost').addEventListener('click',function(){setMode('leftmost',this);});
  document.getElementById('seg-rightmost').addEventListener('click',function(){setMode('rightmost',this);});

  document.getElementById('spd-slow').addEventListener('click',function(){setSpeed(600,this);});
  document.getElementById('spd-normal').addEventListener('click',function(){setSpeed(300,this);});

function setMode(m,btn){APP.mode=m;document.querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');}
function setSpeed(s,btn){APP.speed=s;document.querySelectorAll('.spdb').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');}

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showErr(msg){var b=document.getElementById('errBox');if(!msg){b.style.display='none';return;}b.textContent=msg;b.style.display='block';}
function updateTokens(){
  var v=document.getElementById('inputString').value.trim();
  var b=document.getElementById('tokBox');
  // Changed ε to e in hint
  if(!v){b.innerHTML='<span style="font-size:.65rem;color:var(--ink4);font-family:var(--mono)">e (empty string)</span>';return;}
  b.innerHTML=v.split('').map(function(c){return'<span class="tk">'+esc(c)+'</span>';}).join('');
}
function showPage(id){
  document.querySelectorAll('.nl').forEach(function(b){b.classList.remove('on');});
  var nb=document.getElementById('nav-'+id);if(nb)nb.classList.add('on');
  var m=document.getElementById('pg-main');if(m)m.style.display=id==='main'?'':'none';
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
  if(id!=='main'){var pg=document.getElementById('pg-'+id);if(pg)pg.classList.add('on');}
}
function switchTab(id){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  var t=document.querySelector('.tab[data-t="'+id+'"]');if(t)t.classList.add('on');
  document.querySelectorAll('.pane').forEach(function(p){p.classList.add('hid');p.classList.remove('on');});
  var pane=document.getElementById('pane-'+id);if(pane){pane.classList.remove('hid');pane.classList.add('on');}
}
function exportSVG(){
  var svg=document.querySelector('#treeVP svg');if(!svg){alert('Generate a parse tree first.');return;}
  var d=new XMLSerializer().serializeToString(svg);
  var b=new Blob([d],{type:'image/svg+xml'});
  var u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='parse_tree.svg';a.click();URL.revokeObjectURL(u);
}
function zoomT(factor){
  var svg=document.querySelector('#treeVP svg');if(!svg)return;
  APP.zoom=factor===0?1:Math.max(.2,Math.min(4,APP.zoom*factor));
  var w=parseFloat(svg.getAttribute('data-w')),h=parseFloat(svg.getAttribute('data-h'));
  svg.setAttribute('width',(w*APP.zoom)+'px');svg.setAttribute('height',(h*APP.zoom)+'px');
  document.getElementById('zlbl').textContent=Math.round(APP.zoom*100)+'%';
}

// ═══════════════════════════════════════════════════
// PRESETS
// ═══════════════════════════════════════════════════
var PRESETS={
  anbn:{start:'S',rules:'S → a S b | a b',input:'aaabbb'},
  arith:{start:'E',rules:'E → E + T | T\nT → T * F | F\nF → ( E ) | id',input:'id + id * id'},
  palin:{start:'S',rules:'S → a S a | b S b | a | b | e',input:'abba'}, // Changed ε to e
  paren:{start:'S',rules:'S → ( S ) | S S | e',input:'(())'} // Changed ε to e
};
function loadPreset(k){
  var p=PRESETS[k];if(!p)return;
  document.getElementById('startSymbol').value=p.start;
  document.getElementById('grammarRules').value=p.rules;
  document.getElementById('inputString').value=p.input;
  updateTokens();showErr('');
}

// ═══════════════════════════════════════════════════
// CFG ENGINE
// ═══════════════════════════════════════════════════
function parseGrammar(txt,start){
  var grammar={},allNT=new Set(),allT=new Set();
  txt.split('\n').forEach(function(line){
    line=line.trim();if(!line)return;
    var sep=line.indexOf('→')>=0?'→':line.indexOf('->')>=0?'->':':=';
    var si=line.indexOf(sep);if(si<0)return;
    var lhs=line.slice(0,si).trim(),rhs=line.slice(si+sep.length);
    if(!lhs)return;
    allNT.add(lhs);grammar[lhs]=grammar[lhs]||[];
    rhs.split('|').forEach(function(alt){
      alt=alt.trim();if(alt==='')return;
      // Changed ε detection to e
      if(alt==='e'||alt==='ε'||alt==='eps'||alt==='epsilon'){grammar[lhs].push(['e']);return;}
      var syms=alt.indexOf(' ')>=0?alt.split(/\s+/).filter(Boolean):alt.split('');
      grammar[lhs].push(syms);
    });
  });
  Object.values(grammar).forEach(function(prods){prods.forEach(function(p){p.forEach(function(s){if(s!=='e'&&!allNT.has(s))allT.add(s);});});}); // Changed ε to e
  return{grammar:grammar,allNT:allNT,allT:allT};
}
function fstr(form){return form.filter(function(s){return s!=='e';}).join('');} // Changed ε to e
function deriveLeft(grammar,allNT,start,target,maxSteps){
  var queue=[{form:[start],path:[[start]]}],visited=new Set();
  while(queue.length>0){
    var cur=queue.shift(),form=cur.form,path=cur.path;
    if(path.length>maxSteps+1)continue;
    var key=form.join('\x00');if(visited.has(key))continue;visited.add(key);
    if(fstr(form)===target&&!form.some(function(s){return allNT.has(s);}))return path;
    var idx=form.findIndex(function(s){return allNT.has(s);});if(idx<0)continue;
    var sym=form[idx];
    (grammar[sym]||[]).forEach(function(prod){queue.push({form:form.slice(0,idx).concat(prod).concat(form.slice(idx+1)),path:path.concat([form.slice(0,idx).concat(prod).concat(form.slice(idx+1))])});});
  }
  return null;
}
function deriveRight(grammar,allNT,start,target,maxSteps){
  var queue=[{form:[start],path:[[start]]}],visited=new Set();
  while(queue.length>0){
    var cur=queue.shift(),form=cur.form,path=cur.path;
    if(path.length>maxSteps+1)continue;
    var key=form.join('\x00');if(visited.has(key))continue;visited.add(key);
    if(fstr(form)===target&&!form.some(function(s){return allNT.has(s);}))return path;
    var idx=-1;for(var i=form.length-1;i>=0;i--){if(allNT.has(form[i])){idx=i;break;}}if(idx<0)continue;
    var sym=form[idx];
    (grammar[sym]||[]).forEach(function(prod){queue.push({form:form.slice(0,idx).concat(prod).concat(form.slice(idx+1)),path:path.concat([form.slice(0,idx).concat(prod).concat(form.slice(idx+1))])});});
  }
  return null;
}
function buildTree(grammar,allNT,start,steps){
  if(!steps||steps.length<1)return null;
  function mk(sym){return{sym:sym,children:[]};}
  var root=mk(start),leaves=[root];
  for(var i=1;i<steps.length;i++){
    var step=steps[i],ni=leaves.findIndex(function(n){return allNT.has(n.sym);});if(ni<0)break;
    var leaf=leaves[ni],pf=steps[i-1],li=pf.findIndex(function(s){return allNT.has(s);});
    var used=null;
    (grammar[leaf.sym]||[]).forEach(function(p){if(used)return;var tf=pf.slice(0,li).concat(p).concat(pf.slice(li+1));if(tf.join('\x00')===step.join('\x00'))used=p;});
    if(!used)continue;
    used.forEach(function(cs){leaf.children.push(mk(cs));});
    leaves=leaves.slice(0,ni).concat(leaf.children).concat(leaves.slice(ni+1));
  }
  return root;
}
function analyzeGrammar(grammar,allNT,allT,start){
  var ntArr=[...allNT],tArr=[...allT],prodCount=0,hasUnit=false,hasEps=false,isCNF=true;
  Object.values(grammar).forEach(function(prods){prods.forEach(function(p){
    prodCount++;
    if(p[0]==='e'){hasEps=true;isCNF=false;} // Changed ε to e
    else if(p.length===1&&allNT.has(p[0])){hasUnit=true;isCNF=false;}
    else if(p.length===2&&allNT.has(p[0])&&allNT.has(p[1])){}
    else if(p.length===1&&!allNT.has(p[0])){}
    else isCNF=false;
  });});
  var reachable=new Set([start]),changed=true;
  while(changed){changed=false;reachable.forEach(function(nt){(grammar[nt]||[]).forEach(function(p){p.forEach(function(s){if(allNT.has(s)&&!reachable.has(s)){reachable.add(s);changed=true;}});});});}
  return{ntArr:ntArr,tArr:tArr,prodCount:prodCount,hasUnit:hasUnit,hasEps:hasEps,isCNF:isCNF,unreachable:ntArr.filter(function(nt){return!reachable.has(nt);})};
}

// ═══════════════════════════════════════════════════
// SVG TREE
// ═══════════════════════════════════════════════════
var NR=24,LH=76;
function measure(n){if(!n.children||!n.children.length){n.w=NR*2+20;return;}n.children.forEach(measure);n.w=n.children.reduce(function(s,c){return s+c.w;},0);}
function layout(n,x,y){n.x=x+n.w/2;n.y=y;var cx=x;(n.children||[]).forEach(function(c){layout(c,cx,y+LH);cx+=c.w;});}
function renderSVG(root,allNT){
  measure(root);var PAD=44;layout(root,PAD,NR+PAD);
  var maxY=0;function gmy(n){if(n.y>maxY)maxY=n.y;(n.children||[]).forEach(gmy);}gmy(root);
  var W=root.w+PAD*2,H=maxY+NR+PAD*2,nodes=[],edges=[];
  function col(n){nodes.push(n);(n.children||[]).forEach(function(c){edges.push({x1:n.x,y1:n.y,x2:c.x,y2:c.y});col(c);});}col(root);
  var bg=DARK_ACTIVE?'#131008':'#f5f0e8';
  var s='<svg class="tree" xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" data-w="'+W+'" data-h="'+H+'" style="font-family:\'IBM Plex Mono\',monospace;overflow:visible;background:'+bg+'"><defs><filter id="ng"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-color="rgba(0,0,0,0.15)"/></filter></defs><g>';
  edges.forEach(function(e){s+='<line class="eg" x1="'+e.x1.toFixed(1)+'" y1="'+e.y1.toFixed(1)+'" x2="'+e.x2.toFixed(1)+'" y2="'+e.y2.toFixed(1)+'"/>';});
  nodes.forEach(function(n){
    var iT=n.sym==='e'||!allNT.has(n.sym); // Changed ε to e
    s+='<g transform="translate('+n.x.toFixed(1)+','+n.y.toFixed(1)+')" style="filter:url(#ng)">'
      +'<circle class="'+(iT?'tme':'nte')+'" cx="0" cy="0" r="'+NR+'"/>'
      +'<text class="'+(iT?'tml':'ntl')+'" x="0" y="0" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="IBM Plex Mono,monospace">'+esc(n.sym)+'</text></g>';
  });
  return s+'</g></svg>';
}

// ═══════════════════════════════════════════════════
// RENDER STEPS
// ═══════════════════════════════════════════════════
function renderSteps(steps,allNT,label){
  if(!steps||!steps.length)return'';
  var html='<div class="dmh">'+esc(label)+'</div>';
  for(var i=0;i<steps.length;i++){
    var step=steps[i],isF=(i===0),isL=(i===steps.length-1);
    var cls=isL?'sc sl2':isF?'sc sf':'sc';
    var hlIdx=(!isL&&steps[i+1])?step.findIndex(function(s){return allNT.has(s);}): -1;
    var str='';
    for(var j=0;j<step.length;j++){
      var sym=esc(step[j]);
      if(j===hlIdx)str+='<span class="hl">'+sym+'</span>';
      else if(!allNT.has(step[j])&&step[j]!=='e')str+='<span class="tm">'+sym+'</span>'; // Changed ε to e
      else str+=sym;
    }
    var rl='';
    if(!isF&&i>0){var pf=steps[i-1],pi=pf.findIndex(function(s){return allNT.has(s);});if(pi>=0){var lhs=pf[pi],prod=step.slice(pi,pi+(step.length-pf.length+1)).join(' ');rl='<div class="sr2">// applied: '+esc(lhs)+' → '+esc(prod)+'</div>';}}
    html+='<div class="'+cls+'" style="animation-delay:'+(i*.03)+'s">'
      +'<span class="snum">'+(isF?'S₀':'S'+i)+'</span>'
      +'<div class="sb2"><div class="ss">'+(str||'e')+'</div>'+rl+'</div>' // Changed ε to e
      +'<span class="sa2">'+(isF?'// init':isL?'// accept':'// ⇒')+'</span></div>';
  }
  return html;
}

// ═══════════════════════════════════════════════════
// RENDER INFO
// ═══════════════════════════════════════════════════
function renderInfo(grammar,analysis,start,derived,ll,rl2){
  var a=analysis;
  var html='<div class="icd"><div class="ict">Summary Statistics</div><div class="sg">'
    +'<div class="sb3"><div class="sv">'+a.ntArr.length+'</div><div class="slb">Non-Terminals</div></div>'
    +'<div class="sb3"><div class="sv">'+a.tArr.length+'</div><div class="slb">Terminals</div></div>'
    +'<div class="sb3"><div class="sv">'+a.prodCount+'</div><div class="slb">Productions</div></div>'
    +'<div class="sb3"><div class="sv '+(derived?'ok':'err')+'">'+(derived?'✓':'✗')+'</div><div class="slb">Accepted</div></div>'
    +'<div class="sb3"><div class="sv '+(a.isCNF?'ok':'warn')+'">'+(a.isCNF?'Yes':'No')+'</div><div class="slb">CNF Form</div></div>'
    +'<div class="sb3"><div class="sv '+(a.unreachable.length===0?'ok':'warn')+'">'+(a.unreachable.length===0?'✓':a.unreachable.length)+'</div><div class="slb">Unreachable</div></div>'
    +'</div></div>';
  html+='<div class="icd"><div class="ict">Symbol Sets</div>'
    +'<div style="padding:.65rem .75rem;border-bottom:1px solid var(--rule)"><div style="font-size:.6rem;color:var(--ink4);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)">// Non-Terminals N</div><div class="tl" style="padding:0">'+a.ntArr.map(function(s){return'<span class="tg nt">'+esc(s)+'</span>';}).join('')+'</div></div>'
    +'<div style="padding:.65rem .75rem"><div style="font-size:.6rem;color:var(--ink4);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)">// Terminals Σ</div><div class="tl" style="padding:0">'+a.tArr.map(function(s){return'<span class="tg tm">'+esc(s)+'</span>';}).join('')+'</div></div>'
    +'</div>';
  if(a.hasUnit||a.hasEps||a.unreachable.length>0){
    html+='<div class="icd"><div class="ict">Warnings</div><div style="padding:.5rem .75rem;display:flex;flex-direction:column;gap:.35rem">'
      +(a.hasEps?'<div style="font-size:.75rem;color:var(--amber);font-family:var(--mono);border:1px solid var(--amber);padding:.4rem .6rem;background:rgba(139,94,0,.05)">// e-productions present</div>':'') // Changed ε to e
      +(a.hasUnit?'<div style="font-size:.75rem;color:var(--amber);font-family:var(--mono);border:1px solid var(--amber);padding:.4rem .6rem;background:rgba(139,94,0,.05)">// unit productions present</div>':'')
      +(a.unreachable.length>0?'<div style="font-size:.75rem;color:var(--err);font-family:var(--mono);border:1px solid var(--err);padding:.4rem .6rem;background:rgba(192,57,43,.05)">// unreachable: '+a.unreachable.map(esc).join(', ')+'</div>':'')
      +'</div></div>';
  }
  if(ll!==null||rl2!==null){
    html+='<div class="icd"><div class="ict">Derivation Lengths</div><div style="padding:.65rem .75rem;font-size:.76rem;color:var(--ink2);display:flex;flex-direction:column;gap:.3rem;font-family:var(--mono)">'
      +(ll!==null?'<div>// leftmost: <strong style="color:var(--ink)">'+(ll-1)+' steps</strong></div>':'')
      +(rl2!==null?'<div>// rightmost: <strong style="color:var(--ink)">'+(rl2-1)+' steps</strong></div>':'')
      +'</div></div>';
  }
  html+='<div class="icd"><div class="ict">Production Rules</div><div class="pl">';
  Object.entries(grammar).forEach(function(e){
    html+='<div class="pi3"><span class="lh">'+esc(e[0])+'</span><span class="ar">→</span>'+esc(e[1].map(function(p){return p.join(' ');}).join(' | '))+'</div>';
  });
  return html+'</div></div>';
}

// ═══════════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════════
function animSet(steps,ntSet){animPause();APP.aSteps=steps;APP.aNT=ntSet;APP.aIdx=0;APP.aPlay=false;animRender(0,false);animUpdateProg();}
function animPlay(){if(!APP.aSteps)return;if(APP.aIdx>=APP.aSteps.length-1)APP.aIdx=0;APP.aPlay=true;animAdvance();}
function animPause(){APP.aPlay=false;clearTimeout(APP.aTimer);}
function animReset(){animPause();APP.aIdx=0;animRender(0,false);animUpdateProg();}
function animAdvance(){
  if(!APP.aPlay||!APP.aSteps)return;
  if(APP.aIdx<APP.aSteps.length-1){APP.aIdx++;animRender(APP.aIdx,true);animUpdateProg();APP.aTimer=setTimeout(animAdvance,APP.speed);}
  else{APP.aPlay=false;animBurst();}
}
function animUpdateProg(){
  if(!APP.aSteps)return;
  var pct=APP.aSteps.length<=1?100:(APP.aIdx/(APP.aSteps.length-1))*100;
  document.getElementById('animProg').style.width=pct+'%';
  document.getElementById('animInfo').textContent='Step '+APP.aIdx+' / '+(APP.aSteps.length-1);
}
function animRender(idx,anim){
  var stg=document.getElementById('animStage');if(!APP.aSteps||!stg)return;
  var form=APP.aSteps[idx],isLast=(idx===APP.aSteps.length-1);
  var prevForm=idx>0?APP.aSteps[idx-1]:null;
  var exIdx=prevForm?prevForm.findIndex(function(s){return APP.aNT.has(s);}): -1;
  var ns=exIdx,ne=prevForm?exIdx+(form.length-prevForm.length+1):-1;
  var syms='';
  for(var i=0;i<form.length;i++){
    var sym=form[i],isNT=APP.aNT.has(sym),isNew=anim&&ns>=0&&i>=ns&&i<ne;
    var cls='asym '+(isLast?'acc':isNT?'ant':'atm');
    if(isNew)cls+=' anw';
    syms+='<span class="'+cls+'" style="animation-delay:'+(isNew?(i-ns)*.07:0)+'s">'+esc(sym)+'</span>';
  }
  var rule='';
  if(prevForm&&exIdx>=0){var lhs=prevForm[exIdx],prod=form.slice(ns,ne).join(' ');rule='<div class="arb">'+esc(lhs)+' → '+esc(prod)+'</div>';}
  var accept=isLast?'<div style="position:absolute;bottom:2rem;font-size:.78rem;font-weight:700;color:var(--green);letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono);border:2px solid var(--green);padding:.3rem .9rem;background:rgba(26,74,46,.08)">// STRING ACCEPTED</div>':'';
  stg.innerHTML='<div class="aburst" id="aburst"></div><div class="afd">'+syms+'</div>'+rule+accept+'<div class="asl">// step '+idx+' of '+(APP.aSteps.length-1)+'</div>';
}
function animBurst(){
  var b=document.getElementById('aburst');if(!b)return;
  b.classList.add('show');
  b.innerHTML='<div class="aring" style="animation-delay:0s;border-color:var(--red)"></div><div class="aring" style="animation-delay:.25s;border-color:var(--green)"></div><div class="aring" style="animation-delay:.5s;border-color:var(--blue)"></div>';
  setTimeout(function(){b.classList.remove('show');},1400);
}

// ═══════════════════════════════════════════════════
// GENERATE
// ═══════════════════════════════════════════════════
function doGenerate(){
  showErr('');
  var start=document.getElementById('startSymbol').value.trim();
  var rules=document.getElementById('grammarRules').value.trim();
  var input=document.getElementById('inputString').value.trim();
  var maxS=parseInt(document.getElementById('maxSteps').value)||20;
  if(!start){showErr('Error: start symbol required.');return;}
  if(!rules){showErr('Error: grammar rules required.');return;}
  var btn=document.getElementById('genBtn'),txt=document.getElementById('genTxt');
  btn.disabled=true;txt.textContent='COMPUTING…';
  setTimeout(function(){
    try{_run(start,rules,input,maxS);}
    catch(e){showErr('Error: '+e.message);console.error(e);}
    btn.disabled=false;txt.textContent='RUN DERIVATION';
  },20);
}
function _run(start,rules,input,maxS){
  var p=parseGrammar(rules,start);
  var grammar=p.grammar,allNT=p.allNT,allT=p.allT;
  if(!grammar[start]){showErr('Error: start symbol "'+start+'" has no rules.');return;}
  var leftSteps=null,rightSteps=null;
  if(APP.mode==='leftmost'||APP.mode==='both')leftSteps=deriveLeft(grammar,allNT,start,input,maxS);
  if(APP.mode==='rightmost'||APP.mode==='both')rightSteps=deriveRight(grammar,allNT,start,input,maxS);
  var derived=!!(leftSteps||rightSteps),primary=leftSteps||rightSteps;

  var ban=document.getElementById('banner');
  ban.className='banner '+(derived?'ok':'fail');
  ban.style.display='flex';
  var sc=primary?primary.length-1:0;
  // Changed ε to e in banner
  ban.innerHTML='<span class="bico">'+(derived?'✓':'✗')+'</span>'
    +'<span class="btxt">String <strong>"'+esc(input||'e')+'"</strong> '
    +(derived?'accepted — derivable from the grammar':'rejected — not in the language')+'</span>'
    +(derived?'<span class="bst">'+sc+' steps</span>':'');

  var dhtml='';
  if(derived){
    if(leftSteps)dhtml+=renderSteps(leftSteps,allNT,'// Leftmost Derivation');
    if(rightSteps)dhtml+=renderSteps(rightSteps,allNT,'// Rightmost Derivation');
  }else{
    // Changed ε to e in error message
    dhtml='<div style="color:var(--ink3);font-size:.78rem;padding:.9rem;border:1.5px solid var(--rule);line-height:1.7;font-family:var(--mono)">// Could not derive <strong>"'+esc(input||'e')+'"</strong> within <strong>'+maxS+'</strong> steps.<br>// Increase Max Steps or verify your grammar rules.</div>';
  }
  document.getElementById('derivOut').innerHTML=dhtml;

  var tvp=document.getElementById('treeVP');
  if(primary){
    var root=buildTree(grammar,allNT,start,primary);
    if(root){APP.zoom=1;tvp.innerHTML=renderSVG(root,allNT);document.getElementById('zlbl').textContent='100%';}
    else tvp.innerHTML='<div class="es"><div class="eico">⚠</div><p class="et">Tree failed</p></div>';
  }else{tvp.innerHTML='<div class="es"><div class="eico">✗</div><p class="et">No parse tree</p></div>';}

  if(primary){animSet(primary,allNT);}
  else{
    document.getElementById('animStage').innerHTML='<div class="es"><div class="eico">✗</div><p class="et">Nothing to animate</p></div>';
    document.getElementById('animProg').style.width='0%';
    document.getElementById('animInfo').textContent='Step 0 / 0';
  }

  var analysis=analyzeGrammar(grammar,allNT,allT,start);
  document.getElementById('infoOut').innerHTML=renderInfo(grammar,analysis,start,derived,leftSteps?leftSteps.length:null,rightSteps?rightSteps.length:null);
  switchTab('deriv');
}
</script>
